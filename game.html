<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>BAM Basketball</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas{display:block;width:100vw;height:100vh;image-rendering:pixelated;image-rendering:crisp-edges;object-fit:contain}

/* Touch controls — zone-based, not individual buttons */
#touch-controls{position:fixed;bottom:0;left:0;right:0;height:45vh;display:none;z-index:10;pointer-events:none}

/* Left zone: d-pad area */
#zone-dpad{position:absolute;left:0;top:0;width:50%;height:100%;pointer-events:auto}

/* Right zone: action buttons */
#zone-actions{position:absolute;right:0;top:0;width:50%;height:100%;pointer-events:auto}

/* Visual d-pad overlay (non-interactive, just visual) */
.dpad-visual{position:absolute;left:20px;bottom:20px;width:110px;height:110px;pointer-events:none;opacity:0.5}
.dpad-visual .h{position:absolute;left:0;top:37px;width:110px;height:36px;background:rgba(255,255,255,0.12);border-radius:6px}
.dpad-visual .v{position:absolute;left:37px;top:0;width:36px;height:110px;background:rgba(255,255,255,0.12);border-radius:6px}
.dpad-visual .center{position:absolute;left:37px;top:37px;width:36px;height:36px;background:rgba(255,255,255,0.18);border-radius:4px}
.dpad-visual .arrow{position:absolute;color:rgba(255,255,255,0.4);font-size:16px;font-family:'Press Start 2P',monospace;display:flex;align-items:center;justify-content:center}
.dpad-visual .arrow.up{left:37px;top:4px;width:36px;height:30px}
.dpad-visual .arrow.down{left:37px;bottom:4px;width:36px;height:30px}
.dpad-visual .arrow.left{left:4px;top:37px;width:30px;height:36px}
.dpad-visual .arrow.right{right:4px;top:37px;width:30px;height:36px}

/* Visual action buttons (non-interactive, just visual) */
.action-visual{position:absolute;right:20px;bottom:20px;width:130px;height:110px;pointer-events:none;opacity:0.5}
.action-visual .btn{position:absolute;width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Press Start 2P',monospace;font-size:10px;color:rgba(255,255,255,0.7)}
.action-visual .btn-a{background:rgba(255,23,68,0.35);border:2px solid rgba(255,23,68,0.5);right:0;top:0}
.action-visual .btn-b{background:rgba(33,150,243,0.35);border:2px solid rgba(33,150,243,0.5);left:0;bottom:0}

/* Start button */
.start-visual{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);pointer-events:auto;
  width:64px;height:28px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);
  border-radius:14px;color:rgba(255,255,255,0.5);font-size:7px;font-family:'Press Start 2P',monospace;
  display:flex;align-items:center;justify-content:center;opacity:0.5}

.back-btn{position:fixed;top:8px;left:8px;z-index:20;background:rgba(0,0,0,0.6);color:#ff1744;border:1px solid #ff1744;padding:4px 10px;font-size:8px;font-family:'Press Start 2P',monospace;text-decoration:none;border-radius:4px}
</style>
</head>
<body>
<a href="index.html" class="back-btn">< BACK</a>
<canvas id="c" width="256" height="240"></canvas>

<div id="touch-controls">
  <div id="zone-dpad">
    <div class="dpad-visual">
      <div class="h"></div>
      <div class="v"></div>
      <div class="center"></div>
      <div class="arrow up">^</div>
      <div class="arrow down">v</div>
      <div class="arrow left"><</div>
      <div class="arrow right">></div>
    </div>
  </div>
  <div id="zone-actions">
    <div class="action-visual">
      <div class="btn btn-a">A</div>
      <div class="btn btn-b">B</div>
    </div>
  </div>
  <div class="start-visual">START</div>
</div>

<script src="static/game/court.js"></script>
<script src="static/game/playerRenderer.js"></script>
<script src="static/game/BallPhysics.js"></script>
<script src="static/game/InputController.js"></script>
<script src="static/game/PlayerManager.js"></script>
<script src="static/game/ShotMechanics.js"></script>
<script src="static/game/SoundFX.js"></script>
<script src="static/game/TitleScreen.js"></script>
<script src="static/game/AIController.js"></script>
<script src="static/game/GameState.js"></script>
<script>
(function() {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const W = 256, H = 240;

  // Detect mobile — show touch controls on narrow screens OR touch devices
  const isMobile = (('ontouchstart' in window || navigator.maxTouchPoints > 0) && window.innerWidth < 1024);
  if (isMobile) document.getElementById('touch-controls').style.display = 'block';

  // ═══════════════════════════════════════════════════════════════════════════
  // UNIFIED INPUT SYSTEM
  // Merges keyboard (InputController) and touch into a single state each frame
  // ═══════════════════════════════════════════════════════════════════════════

  const input = {
    // Continuous (held) state
    dx: 0, dy: 0, turbo: false,
    // Edge-detected (just pressed this frame)
    shootJust: false, passJust: false, startJust: false,
    // Raw hold state for touch buttons
    _shootHeld: false, _passHeld: false, _startHeld: false,
    _prevShootHeld: false, _prevPassHeld: false, _prevStartHeld: false,
    // Touch d-pad tracking
    _dpadTouchId: null,
    _dpadCenterX: 0, _dpadCenterY: 0,
    _dpadDx: 0, _dpadDy: 0,
    // Touch action tracking (multiple simultaneous touches)
    _actionTouches: {}, // touchId -> 'shoot' | 'pass' | 'start'
  };

  // ── Touch Setup ──────────────────────────────────────────────────────────

  function setupTouch() {
    const dpad = document.getElementById('zone-dpad');
    const actions = document.getElementById('zone-actions');
    const startBtn = document.querySelector('.start-visual');

    // D-PAD: track finger position relative to initial touch point
    dpad.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.changedTouches[0];
      input._dpadTouchId = t.identifier;
      input._dpadCenterX = t.clientX;
      input._dpadCenterY = t.clientY;
      input._dpadDx = 0;
      input._dpadDy = 0;
    }, {passive: false});

    dpad.addEventListener('touchmove', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === input._dpadTouchId) {
          const dx = t.clientX - input._dpadCenterX;
          const dy = t.clientY - input._dpadCenterY;
          const deadzone = 10;
          input._dpadDx = Math.abs(dx) > deadzone ? (dx > 0 ? 1 : -1) : 0;
          input._dpadDy = Math.abs(dy) > deadzone ? (dy > 0 ? 1 : -1) : 0;
        }
      }
    }, {passive: false});

    dpad.addEventListener('touchend', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        if (t.identifier === input._dpadTouchId) {
          input._dpadTouchId = null;
          input._dpadDx = 0;
          input._dpadDy = 0;
        }
      }
    }, {passive: false});

    dpad.addEventListener('touchcancel', (e) => {
      e.preventDefault();
      input._dpadTouchId = null;
      input._dpadDx = 0;
      input._dpadDy = 0;
    }, {passive: false});

    // ACTION BUTTONS: zone-based detection
    // Top-right area of zone = A (shoot), bottom-left area = B (pass)
    actions.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        const rect = actions.getBoundingClientRect();
        const rx = (t.clientX - rect.left) / rect.width;
        const ry = (t.clientY - rect.top) / rect.height;
        // A button zone: right side, upper area
        // B button zone: left side, lower area
        // Simple split: top-right = shoot, bottom-left = pass
        if (rx > 0.35 && ry < 0.65) {
          input._actionTouches[t.identifier] = 'shoot';
        } else {
          input._actionTouches[t.identifier] = 'pass';
        }
      }
    }, {passive: false});

    actions.addEventListener('touchend', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        delete input._actionTouches[t.identifier];
      }
    }, {passive: false});

    actions.addEventListener('touchcancel', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        delete input._actionTouches[t.identifier];
      }
    }, {passive: false});

    // START button
    startBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        input._actionTouches[t.identifier] = 'start';
      }
    }, {passive: false});

    startBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        delete input._actionTouches[t.identifier];
      }
    }, {passive: false});

    startBtn.addEventListener('touchcancel', (e) => {
      e.preventDefault();
      for (const t of e.changedTouches) {
        delete input._actionTouches[t.identifier];
      }
    }, {passive: false});

    // Global touch on canvas for menu screens (title, howtoplay, gameover)
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      // Set a flag for any-tap detection used by menu screens
      input._canvasTapped = true;
    }, {passive: false});
  }

  // ── Input Update (call once per frame BEFORE reading input) ──────────────

  function updateInput() {
    // Keyboard state from InputController
    const move = InputController.getMovement();
    const kbShoot = InputController.isShootPressed();
    const kbPass = InputController.isPassPressed();
    const kbPause = InputController.isPausePressed();
    const kbTurbo = InputController.isTurbo();

    // Touch action buttons: derive held state from active touches
    let touchShoot = false, touchPass = false, touchStart = false;
    for (const id in input._actionTouches) {
      const v = input._actionTouches[id];
      if (v === 'shoot') touchShoot = true;
      if (v === 'pass') touchPass = true;
      if (v === 'start') touchStart = true;
    }

    // Merge d-pad
    input.dx = move.dx || input._dpadDx;
    input.dy = move.dy || input._dpadDy;

    // Current held state
    const shootNow = kbShoot || touchShoot;
    const passNow = kbPass || touchPass;
    const startNow = kbPause || touchStart || !!input._canvasTapped;

    // Edge detection: just pressed = now true AND was false last frame
    input.shootJust = shootNow && !input._prevShootHeld;
    input.passJust = passNow && !input._prevPassHeld;
    input.startJust = startNow && !input._prevStartHeld;

    input.turbo = kbTurbo;

    // Save for next frame
    input._prevShootHeld = shootNow;
    input._prevPassHeld = passNow;
    input._prevStartHeld = startNow;
    input._shootHeld = shootNow;
    input._passHeld = passNow;
    input._startHeld = startNow;

    // Clear canvas tap
    input._canvasTapped = false;

    // Update InputController's internal state
    InputController.update();
  }

  setupTouch();
  InputController.init();

  // ═══════════════════════════════════════════════════════════════════════════
  // GAME STATE
  // ═══════════════════════════════════════════════════════════════════════════

  let scene = 'title'; // title | howtoplay | playing | paused | quarterBreak | gameover
  let frame = 0;
  let gs = null;
  let players = [];
  let controlledIdx = 0;
  let shotInProgress = null;
  let shotPower = 0;
  let shotActive = false;

  const LEFT_HOOP = {x:24, y:120};
  const RIGHT_HOOP = {x:232, y:120};

  function startGame() {
    gs = GameState.create({homeTeam:'HEAT', awayTeam:'CELTICS'});
    players = PlayerManager.createPlayers();
    controlledIdx = 0;
    BallPhysics.ball.state = 'held';
    BallPhysics.ball.holder = players[0];
    players[0].hasBall = true;
    gs.startQuarter();
    scene = 'playing';
    shotInProgress = null;
    shotPower = 0;
    shotActive = false;
    try { SoundFX.init(); } catch(e) {}
  }

  function getControlled() { return players[controlledIdx]; }
  function getTeamPlayers(team) { return players.filter(p => p.team === team); }
  function dist(a, b) { return Math.sqrt((a.x-b.x)**2 + (a.y-b.y)**2); }

  function findClosestHome() {
    let best = 0, bestD = Infinity;
    for (let i = 0; i < players.length; i++) {
      if (players[i].team !== 'home') continue;
      const d = dist(players[i], BallPhysics.ball);
      if (d < bestD) { bestD = d; best = i; }
    }
    return best;
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // GAME LOOP
  // ═══════════════════════════════════════════════════════════════════════════

  function gameLoop() {
    frame++;
    ctx.clearRect(0, 0, W, H);
    updateInput();

    // ── TITLE SCREEN ──
    if (scene === 'title') {
      TitleScreen.drawTitle(ctx, W, H, frame);
      if (input.startJust || input.shootJust) {
        scene = 'howtoplay';
      }
      requestAnimationFrame(gameLoop);
      return;
    }

    // ── HOW TO PLAY ──
    if (scene === 'howtoplay') {
      TitleScreen.drawHowToPlay(ctx, W, H, frame, isMobile);
      if (input.startJust || input.shootJust) {
        startGame();
      }
      requestAnimationFrame(gameLoop);
      return;
    }

    // ── GAME OVER ──
    if (scene === 'gameover') {
      TitleScreen.drawGameOver(ctx, W, H, gs.homeScore, gs.awayScore, frame);
      if (input.startJust || input.shootJust) { scene = 'title'; }
      requestAnimationFrame(gameLoop);
      return;
    }

    // ── PAUSED ──
    if (scene === 'paused') {
      Court.draw(ctx, W, H);
      drawPlayers();
      BallPhysics.drawShadow(ctx);
      BallPhysics.drawBall(ctx);
      gs.drawHUD(ctx, W, H);
      TitleScreen.drawPauseMenu(ctx, W, H, 0);
      if (input.startJust) { scene = 'playing'; gs.gameState = 'playing'; }
      requestAnimationFrame(gameLoop);
      return;
    }

    // ── PLAYING ──
    gs.update();

    if (gs.gameState === 'gameover') { scene = 'gameover'; }
    if (gs.gameState === 'quarterEnd' || gs.gameState === 'halftime') {
      Court.draw(ctx, W, H);
      drawPlayers();
      gs.drawHUD(ctx, W, H);
      TitleScreen.drawQuarterBreak(ctx, W, H, gs.quarter);
      requestAnimationFrame(gameLoop);
      return;
    }

    // Pause check
    if (input.startJust && gs.gameState === 'playing') {
      scene = 'paused'; gs.gameState = 'paused';
    }

    const dx = input.dx, dy = input.dy;
    const turbo = input.turbo;
    const shootPressed = input.shootJust;
    const passPressed = input.passJust;

    const controlled = getControlled();
    const homePlayers = getTeamPlayers('home');
    const awayPlayers = getTeamPlayers('away');
    const homeOnOffense = gs.possession === 'home';

    // Move controlled player
    if (gs.gameState === 'playing' || gs.gameState === 'scored') {
      PlayerManager.movePlayer(controlled, dx, dy, turbo, players);
    }

    // Player actions
    if (gs.gameState === 'playing') {
      if (homeOnOffense && controlled.hasBall) {
        if (shootPressed && !shotActive) {
          shotActive = true;
          shotPower = 0;
          const shot = ShotMechanics.initShot(controlled, RIGHT_HOOP.x, RIGHT_HOOP.y);
          shot.contested = ShotMechanics.isContested(controlled, awayPlayers);
          shot.releaseQuality = 0.4 + Math.random() * 0.2;
          shotInProgress = shot;
          const result = ShotMechanics.attemptShot(shot);

          BallPhysics.ball.holder = null;
          controlled.hasBall = false;
          controlled.shooting = true;
          BallPhysics.shoot(controlled.x, controlled.y, RIGHT_HOOP.x, RIGHT_HOOP.y);

          setTimeout(() => {
            controlled.shooting = false;
            if (result === 'made') {
              const pts = shot.type === 'three' ? 3 : 2;
              gs.onScore('home', pts);
              try { SoundFX.swish(); } catch(e) {}
              setTimeout(() => { resetAfterScore('away'); }, 500);
            } else {
              try { SoundFX.brick(); } catch(e) {}
              if (shot.reboundX !== undefined) {
                BallPhysics.ball.x = shot.reboundX;
                BallPhysics.ball.y = shot.reboundY;
              }
              BallPhysics.ball.state = 'loose';
              BallPhysics.ball.z = 0;
              BallPhysics.ball.vx = (Math.random() - 0.5) * 2;
              BallPhysics.ball.vy = (Math.random() - 0.5) * 2;
              BallPhysics.ball.vz = 0;
            }
            shotActive = false;
            shotInProgress = null;
          }, 600);
        }
        if (passPressed) {
          const teammate = PlayerManager.findNearestTeammate(controlled, players);
          if (teammate) {
            controlled.hasBall = false;
            BallPhysics.pass(controlled.x, controlled.y, teammate.x, teammate.y);
            try { SoundFX.pass(); } catch(e) {}
            setTimeout(() => {
              if (BallPhysics.ball.state === 'passing') {
                BallPhysics.ball.state = 'held';
                BallPhysics.ball.holder = teammate;
                teammate.hasBall = true;
                controlledIdx = players.indexOf(teammate);
              }
            }, 300);
          }
        }
      } else if (!homeOnOffense) {
        if (shootPressed) {
          const ballHolder = players.find(p => p.hasBall && p.team === 'away');
          if (ballHolder && dist(controlled, ballHolder) < 18) {
            if (PlayerManager.attemptSteal(controlled, ballHolder)) {
              ballHolder.hasBall = false;
              controlled.hasBall = true;
              BallPhysics.ball.state = 'held';
              BallPhysics.ball.holder = controlled;
              gs.onTurnover('home');
              try { SoundFX.steal(); } catch(e) {}
            }
          }
        }
        if (passPressed) {
          controlledIdx = PlayerManager.switchControlled(players, controlledIdx, 'home');
        }
      }
    }

    // AI control
    if (gs.gameState === 'playing') {
      const aiActions = AIController.update(awayPlayers, homePlayers, BallPhysics.ball, gs.awayScore, gs.homeScore, gs.shotClock);
      for (let i = 0; i < awayPlayers.length; i++) {
        const p = awayPlayers[i];
        const a = aiActions[i] || {dx:0,dy:0,action:null};
        PlayerManager.movePlayer(p, a.dx, a.dy, false, players);

        if (a.action === 'shoot' && p.hasBall) {
          const shot = ShotMechanics.initShot(p, LEFT_HOOP.x, LEFT_HOOP.y);
          shot.contested = ShotMechanics.isContested(p, homePlayers);
          shot.releaseQuality = 0.3 + Math.random() * 0.4;
          const result = ShotMechanics.attemptShot(shot);

          p.hasBall = false;
          p.shooting = true;
          BallPhysics.ball.holder = null;
          BallPhysics.shoot(p.x, p.y, LEFT_HOOP.x, LEFT_HOOP.y);

          setTimeout(() => {
            p.shooting = false;
            if (result === 'made') {
              const pts = shot.type === 'three' ? 3 : 2;
              gs.onScore('away', pts);
              try { SoundFX.swish(); } catch(e) {}
              setTimeout(() => resetAfterScore('home'), 500);
            } else {
              try { SoundFX.brick(); } catch(e) {}
              BallPhysics.ball.state = 'loose';
              BallPhysics.ball.z = 0;
              if (shot.reboundX !== undefined) {
                BallPhysics.ball.x = shot.reboundX;
                BallPhysics.ball.y = shot.reboundY;
              }
            }
          }, 600);
        }

        if (a.action === 'pass' && p.hasBall) {
          const target = awayPlayers.find((t,j) => j !== i && !t.hasBall);
          if (target) {
            p.hasBall = false;
            BallPhysics.pass(p.x, p.y, target.x, target.y);
            setTimeout(() => {
              if (BallPhysics.ball.state === 'passing') {
                BallPhysics.ball.state = 'held';
                BallPhysics.ball.holder = target;
                target.hasBall = true;
              }
            }, 300);
          }
        }

        if (a.action === 'steal') {
          const ballHolder = players.find(pp => pp.hasBall && pp.team === 'home');
          if (ballHolder && dist(p, ballHolder) < 18) {
            if (PlayerManager.attemptSteal(p, ballHolder)) {
              ballHolder.hasBall = false;
              p.hasBall = true;
              BallPhysics.ball.state = 'held';
              BallPhysics.ball.holder = p;
              gs.onTurnover('away');
              try { SoundFX.steal(); } catch(e) {}
            }
          }
        }
      }
    }

    // Loose ball pickup
    if (BallPhysics.ball.state === 'loose') {
      for (const p of players) {
        if (dist(p, BallPhysics.ball) < 10 && !p.hasBall) {
          p.hasBall = true;
          BallPhysics.ball.state = 'held';
          BallPhysics.ball.holder = p;
          BallPhysics.ball.vx = 0;
          BallPhysics.ball.vy = 0;
          BallPhysics.ball.vz = 0;
          BallPhysics.ball.z = 0;
          gs.possession = p.team;
          if (p.team === 'home') controlledIdx = players.indexOf(p);
          try { SoundFX.bounce(); } catch(e) {}
          break;
        }
      }
    }

    // Update ball physics
    BallPhysics.update(1);

    // Auto-switch to ball handler on offense
    if (homeOnOffense) {
      const handler = players.find(p => p.hasBall && p.team === 'home');
      if (handler) controlledIdx = players.indexOf(handler);
    } else {
      if (frame % 30 === 0) controlledIdx = findClosestHome();
    }

    // Non-controlled home players drift toward positions
    for (let i = 0; i < players.length; i++) {
      if (players[i].team !== 'home' || i === controlledIdx) continue;
      const p = players[i];
      const positions = homeOnOffense
        ? PlayerManager.getOffensivePositions('right')
        : PlayerManager.getDefensivePositions('left');
      const posIdx = homePlayers.indexOf(p);
      if (posIdx >= 0 && posIdx < positions.length) {
        const tgt = positions[posIdx];
        const tdx = tgt.x - p.x, tdy = tgt.y - p.y;
        const tdist = Math.sqrt(tdx*tdx + tdy*tdy);
        if (tdist > 3) {
          PlayerManager.movePlayer(p, tdx/tdist > 0.3 ? 1 : tdx/tdist < -0.3 ? -1 : 0,
                                      tdy/tdist > 0.3 ? 1 : tdy/tdist < -0.3 ? -1 : 0,
                                      false, players);
        }
      }
    }

    // Draw
    Court.draw(ctx, W, H);
    BallPhysics.drawShadow(ctx);
    drawPlayers();
    BallPhysics.drawBall(ctx);
    gs.drawHUD(ctx, W, H);

    // Controlled player indicator
    const cp = getControlled();
    ctx.fillStyle = '#fff';
    ctx.fillRect(cp.x - 1, cp.y - 18, 3, 1);
    ctx.fillRect(cp.x, cp.y - 19, 1, 1);

    requestAnimationFrame(gameLoop);
  }

  function drawPlayers() {
    const sorted = [...players].sort((a,b) => a.y - b.y);
    for (const p of sorted) {
      const color = p.team === 'home' ? '#ff1744' : '#2196f3';
      ctx.save();
      ctx.translate(p.x - 8, p.y - 12);
      PlayerRenderer.drawPlayer(ctx, 0, 0, color, p.direction, p.frame, p.hasBall, p.shooting);
      ctx.restore();
    }
  }

  function resetAfterScore(newPossTeam) {
    for (const p of players) p.hasBall = false;
    const pg = players.find(p => p.team === newPossTeam && p.index === 0);
    if (pg) {
      pg.hasBall = true;
      BallPhysics.ball.state = 'held';
      BallPhysics.ball.holder = pg;
      BallPhysics.ball.z = 0;
      BallPhysics.ball.vx = 0;
      BallPhysics.ball.vy = 0;
      if (newPossTeam === 'home') controlledIdx = players.indexOf(pg);
    }
    PlayerManager.resetPositions(players, newPossTeam);
  }

  // Start
  requestAnimationFrame(gameLoop);
})();
</script>
